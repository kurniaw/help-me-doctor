name: Seed Data (One-time)

on:
  workflow_dispatch:
    inputs:
      drop_collections:
        description: "Drop existing collections before inserting"
        type: boolean
        default: false
      run_vertex:
        description: "Run Vertex AI embedding ingestion"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-southeast1

jobs:
  seed-mongo:
    name: Ingest CSVs → MongoDB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run MongoDB ingestion
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB_NAME: helpmedoctor
        run: |
          DROP_FLAG=""
          if [ "${{ inputs.drop_collections }}" = "true" ]; then
            DROP_FLAG="--drop"
          fi
          poetry run python scripts/ingest_mongo.py --data-dir ../data $DROP_FLAG

  seed-vertex:
    name: Ingest Embeddings → Vertex AI
    runs-on: ubuntu-latest
    if: ${{ inputs.run_vertex }}
    needs: seed-mongo
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction

      - name: Run Vertex AI ingestion
        working-directory: backend
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          poetry run python scripts/ingest_vertex.py \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.REGION }}" \
            --bucket "${{ secrets.GCP_PROJECT_ID }}-hmd-data" \
            --data-dir ../data
