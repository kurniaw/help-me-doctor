name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

env:
  REGION: asia-southeast1
  GEMINI_REGION: us-central1

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Docker metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hmd-images/backend
          tags: |
            type=sha,prefix=,suffix=,format=long
            type=raw,value=latest

      - name: Docker metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hmd-images/frontend
          tags: |
            type=sha,prefix=,suffix=,format=long
            type=raw,value=latest

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          build-args: |
            NUXT_PUBLIC_API_BASE=${{ vars.BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend
        run: |
          gcloud run deploy hmd-backend \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hmd-images/backend:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --set-secrets="MONGO_URI=hmd-mongo-uri:latest,JWT_SECRET=hmd-jwt-secret:latest" \
            --set-env-vars="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars="GCP_REGION=${{ env.REGION }}" \
            --set-env-vars="GEMINI_REGION=${{ env.GEMINI_REGION }}" \
            --set-env-vars="VERTEX_INDEX_ID=${{ secrets.VERTEX_INDEX_ID }}" \
            --set-env-vars="VERTEX_INDEX_ENDPOINT_ID=${{ secrets.VERTEX_INDEX_ENDPOINT_ID }}" \
            --set-env-vars="VERTEX_DEPLOYED_INDEX_ID=${{ secrets.VERTEX_DEPLOYED_INDEX_ID }}" \
            --set-env-vars="GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" \
            --set-env-vars="GEMINI_MODEL=${{ vars.GEMINI_MODEL }}"

      - name: Deploy frontend
        run: |
          gcloud run deploy hmd-frontend \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hmd-images/frontend:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars="NUXT_PUBLIC_API_BASE=${{ vars.BACKEND_URL }}"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check backend health
        run: |
          echo "Backend URL: ${{ vars.BACKEND_URL }}"
          curl --fail --retry 5 --retry-delay 10 \
            "${{ vars.BACKEND_URL }}/health"

      - name: Check frontend
        run: |
          echo "Frontend URL: ${{ vars.FRONTEND_URL }}"
          curl --fail --retry 5 --retry-delay 10 \
            "${{ vars.FRONTEND_URL }}"

      - name: Deployment summary
        run: |
          echo "### ✅ Deployment Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${{ vars.FRONTEND_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend API | ${{ vars.BACKEND_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
