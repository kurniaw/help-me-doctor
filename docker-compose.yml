services:
  mongo:
    image: mongo:7
    container_name: hmd-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: helpmedoctor
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hmd-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: hmd-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    env_file:
      - ./backend/.env
    environment:
      # Override .env values that must differ inside the Docker network
      MONGO_URI: mongodb://mongo:27017
      GOOGLE_APPLICATION_CREDENTIALS: /app/service-account.json
      DATA_DIR: /data
    depends_on:
      - mongo
    networks:
      - hmd-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hmd-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      # Inside the Docker network the backend is reachable via service name.
      # The browser also needs to reach the API — set NUXT_PUBLIC_API_BASE to
      # http://localhost:8000 if calling from the browser, or http://backend:8000
      # for server-side rendering calls within the container network.
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - hmd-network

volumes:
  mongo_data:

networks:
  hmd-network:
    driver: bridge
